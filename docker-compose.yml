services:
  db:
    image: postgres:16
    container_name: zinventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zinventory}
      POSTGRES_USER: ${POSTGRES_USER:-zinventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zinventory_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: zinventory_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      ZOHO_ACCOUNTS_URL: ${ZOHO_ACCOUNTS_URL}
      ZOHO_INVENTORY_BASE_URL: ${ZOHO_INVENTORY_BASE_URL}
      ZOHO_ORGANIZATION_ID: ${ZOHO_ORGANIZATION_ID}
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET}
      ZOHO_REFRESH_TOKEN: ${ZOHO_REFRESH_TOKEN}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: zinventory_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "80:3000"

volumes:
  postgres_data: